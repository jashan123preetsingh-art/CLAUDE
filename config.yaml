# Options Trading Bot Configuration
# ====================================

app:
  name: "IndiaOptions AlgoBot"
  version: "1.0.0"
  mode: "paper"  # paper | live
  log_level: "INFO"
  timezone: "Asia/Kolkata"

market:
  exchange: "NSE"
  indices:
    - symbol: "NIFTY 50"
      lot_size: 25
      tick_size: 0.05
    - symbol: "BANKNIFTY"
      lot_size: 15
      tick_size: 0.05
    - symbol: "FINNIFTY"
      lot_size: 25
      tick_size: 0.05
  trading_hours:
    start: "09:15"
    end: "15:30"
    pre_open: "09:00"
  holidays_calendar: "NSE"

data:
  provider: "nse"  # nse | zerodha | angel
  historical_days: 365
  option_chain_refresh_seconds: 5
  cache_enabled: true
  cache_ttl_seconds: 300
  database_url: "sqlite:///data/trading_bot.db"

pricing:
  model: "black_scholes"  # black_scholes | binomial
  risk_free_rate: 0.065  # India 10Y yield approx
  dividend_yield: 0.012
  iv_method: "newton_raphson"  # newton_raphson | bisection
  greeks_method: "analytical"

strategies:
  enabled:
    - iron_condor
    - iron_butterfly
    - short_straddle
    - short_strangle
    - bull_call_spread
    - bear_put_spread
    - jade_lizard
    - ratio_spread
    - calendar_spread
  default_expiry: "weekly"  # weekly | monthly
  max_positions: 5
  entry_time: "09:20"
  exit_time: "15:15"
  auto_square_off_minutes: 5  # minutes before market close

signals:
  iv_rank:
    lookback_days: 252
    high_threshold: 50
    low_threshold: 30
  pcr:
    bullish_threshold: 0.7
    bearish_threshold: 1.3
  oi_analysis:
    change_threshold_pct: 10
  technicals:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bollinger_period: 20
    bollinger_std: 2
    vwap_enabled: true

risk:
  max_portfolio_delta: 100
  max_portfolio_gamma: 50
  max_portfolio_vega: 5000
  max_portfolio_theta: -2000
  max_loss_per_trade_pct: 2.0
  max_daily_loss_pct: 5.0
  max_drawdown_pct: 15.0
  position_sizing: "kelly"  # kelly | fixed_fractional | fixed_amount
  kelly_fraction: 0.25  # quarter Kelly
  fixed_fraction_pct: 2.0
  margin_buffer_pct: 30
  var_confidence: 0.95
  var_horizon_days: 1

backtesting:
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  initial_capital: 1000000  # 10 Lakhs
  commission_per_order: 20
  slippage_pct: 0.05
  walk_forward:
    in_sample_days: 180
    out_of_sample_days: 30
    step_days: 30
  monte_carlo:
    simulations: 10000
    confidence_levels: [0.90, 0.95, 0.99]

broker:
  default: "zerodha"
  zerodha:
    api_key: ""
    api_secret: ""
    access_token: ""
  angel_one:
    api_key: ""
    client_id: ""
    password: ""
    totp_secret: ""
  upstox:
    api_key: ""
    api_secret: ""
    redirect_uri: ""

dashboard:
  host: "0.0.0.0"
  port: 8080
  debug: false
  refresh_interval_ms: 5000
  auth_enabled: false
  username: "admin"
  password: "changeme"
